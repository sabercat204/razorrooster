# Calibration-backtest defaults (T-CB-001).
#
# These values are the bootstrap defaults referenced by the design doc.
# CLI flags override these at runtime.

default_lag_days: 7
minimum_lag_days: 1
disk_cap_mb: 100
max_workers: 4
trace_compression: zstd
trace_compression_level: 3

# Compare-engine knobs (T-CB-024). Mirrors report_generator's config name
# and default but is read locally to keep subsystem isolation
# (calibration_backtest does not import report_generator at runtime).
compare:
  brier_miscalibration_threshold: 0.25
