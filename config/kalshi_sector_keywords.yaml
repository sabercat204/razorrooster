# Per-sector keyword catalogue for the Kalshi sector heuristic mapper
# (T-KSI-050; design §3.5; OQ-KSI-001 resolution).
#
# Kalshi's catalog is heavier on concrete macroeconomic releases, regulatory
# events, climate / weather thresholds, and concrete geopolitical questions
# than Polymarket's. The keyword sets are tuned accordingly.
#
# 'out_of_scope' captures Sports / Entertainment / daily-life markets
# Kalshi runs that have no Razor-sector analogue — they're persisted
# faithfully but excluded from downstream processing.
#
# Operators: extend these lists as triage feedback arrives. DEFER-KSI-001
# acknowledges this is iterative.

version: 1

sectors:
  public_health:
    - "PHEIC"
    - "CDC"
    - "FDA approval"
    - "vaccine"
    - "outbreak"
    - "pandemic"
    - "WHO"
    - "drug approval"
