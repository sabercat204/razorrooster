# Razor-Rooster sector keyword catalogue for the Polymarket sector
# heuristic mapper (T-PMC-002; design §3.5; OQ-PMC-001 resolution).
#
# DEFER-PMC-001: this list is curated and intentionally small at v1. It
# expands over time as `razor-rooster polymarket needs-review` triage
# feedback identifies missing terms. Adding a keyword here does not
# require code changes; the mapper re-reads at startup.
#
# Conventions:
# - Case-insensitive matching (the loader rejects case-duplicates).
# - Phrases are allowed (e.g. "executive order", "supreme court").
# - Keep keywords specific enough to discriminate; e.g. "rule" alone is
#   too broad — pair with a qualifier where reasonable.

version: 1

